# Docker Swarm stack (desenvolvimento) — referência alinhada ao broker usado pela API.
# Ajuste senhas/hosts antes de commitar em ambientes compartilhados.
#
# VHost: RABBITMQ_DEFAULT_VHOST=default → em appsettings use RabbitMq:VirtualHost = "default"
# UI management: Traefik em rq.interactiveleadspro.com (porta 15672 interna)

version: "3.7"

services:
  rabbitmq:
    image: rabbitmq:4.2.5-management
    hostname: rabbitmq
    entrypoint: docker-entrypoint.sh
    command: rabbitmq-server
    networks:
      - network_swarm_public
    ports:
      - 5672:5672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    environment:
      - RABBITMQ_ERLANG_COOKIE=h8uh8fuh8dfhdfhdfhf
      - RABBITMQ_DEFAULT_VHOST=default
      - RABBITMQ_DEFAULT_USER=JaksonJose
      - RABBITMQ_DEFAULT_PASS=@Inter#123
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.rabbitmq.rule=Host(`rq.interactiveleadspro.com`)
        - traefik.http.routers.rabbitmq.entrypoints=websecure
        - traefik.http.routers.rabbitmq.tls.certresolver=letsencryptresolver
        - traefik.http.routers.rabbitmq.service=rabbitmq
        - traefik.http.services.rabbitmq.loadbalancer.server.port=15672
        - traefik.http.services.rabbitmq.loadbalancer.passHostHeader=true

volumes:
  rabbitmq_data:
    external: true
    name: rabbitmq_data

networks:
  network_swarm_public:
    name: network_swarm_public
    external: true
